name: Publish website and run accessibility scan

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build_and_deploy:
    name: Build & deploy website
    runs-on: ubuntu-latest
    if: github.repository == 'Orange-OpenSource/Tota11ylost'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate firebaseConfig.js
        run: |
          echo "window.env = {" > ./src/firebaseConfig.js
          echo "  FIREBASE_API_KEY: '${{ secrets.FIREBASE_API_KEY }}'," >> ./src/firebaseConfig.js
          echo "  FIREBASE_AUTH_DOMAIN: '${{ secrets.FIREBASE_AUTH_DOMAIN }}'," >> ./src/firebaseConfig.js
          echo "  FIREBASE_PROJECT_ID: '${{ secrets.FIREBASE_PROJECT_ID }}'," >> ./src/firebaseConfig.js
          echo "  FIREBASE_STORAGE_BUCKET: '${{ secrets.FIREBASE_STORAGE_BUCKET }}'," >> ./src/firebaseConfig.js
          echo "  FIREBASE_MESSAGING_SENDER_ID: '${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}'," >> ./src/firebaseConfig.js
          echo "  FIREBASE_APP_ID: '${{ secrets.FIREBASE_APP_ID }}'," >> ./src/firebaseConfig.js
          echo "  FIREBASE_MEASUREMENT_ID: '${{ secrets.FIREBASE_MEASUREMENT_ID }}'" >> ./src/firebaseConfig.js
          echo "};" >> ./src/firebaseConfig.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3.6.4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./src
          cname: tota11ylost.orange.com

  wait_for_deployment:
    name: Wait for deployed website
    needs: build_and_deploy
    runs-on: ubuntu-latest

    steps:
      - name: Wait for GitHub Pages
        run: |
          set -eu

          for attempt in $(seq 1 30); do
            if curl \
              --fail \
              --silent \
              --show-error \
              --output /dev/null \
              "https://tota11ylost.orange.com"; then
              echo "Website is reachable."
              exit 0
            fi

            echo "Website not ready: attempt ${attempt}/30"
            sleep 10
          done

          echo "::error::Website did not become reachable before timeout."
          exit 1

  accessibility:
    name: Run accessibility scan
    needs: wait_for_deployment
    runs-on: ubuntu-latest
    continue-on-error: true

    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble

    env:
      A11Y_URLS: "https://tota11ylost.orange.com"
      A11Y_TEST_TYPE: "essentials"
      A11Y_TARGET: "web"
      A11Y_FETCH_PAST_RUNS: "0"
      PLAYWRIGHT_BROWSERS_PATH: "/ms-playwright"

    steps:
      - name: Validate GitLab secrets
        env:
          GITLAB_USERNAME: ${{ secrets.TOTA11Y_GITLAB_USERNAME }}
          GITLAB_TOKEN: ${{ secrets.TOTA11Y_GITLAB_TOKEN }}
        run: |
          set -eu

          if [ -z "${GITLAB_USERNAME:-}" ]; then
            echo "::error::TOTA11Y_GITLAB_USERNAME is missing."
            exit 1
          fi

          if [ -z "${GITLAB_TOKEN:-}" ]; then
            echo "::error::TOTA11Y_GITLAB_TOKEN is missing."
            exit 1
          fi

          echo "GitLab credentials are configured."
          
      - name: Diagnose GitLab access
        env:
          GITLAB_TOKEN: ${{ secrets.TOTA11Y_GITLAB_TOKEN }}
        run: |
          set -eu

          RESPONSE_FILE="/tmp/gitlab-response"
          HEADERS_FILE="/tmp/gitlab-headers"

          HTTP_STATUS="$(
            curl \
              --silent \
              --show-error \
              --dump-header "${HEADERS_FILE}" \
              --output "${RESPONSE_FILE}" \
              --write-out "%{http_code}" \
              --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
              "https://gitlab.tech.orange/api/v4/projects/574357"
          )"

          echo "GitLab HTTP status: ${HTTP_STATUS}"
          echo "Response Content-Type:"
          grep -i '^content-type:' "${HEADERS_FILE}" || true

          CONTENT_TYPE="$(
            grep -i '^content-type:' "${HEADERS_FILE}" \
              | tail -n 1 \
              | tr -d '\r' \
              || true
          )"

          if printf '%s' "${CONTENT_TYPE}" | grep -qi 'application/json'; then
            node -e "
              const fs = require('fs');
              const body = JSON.parse(
                fs.readFileSync('${RESPONSE_FILE}', 'utf8')
              );

              console.log({
                message: body.message || null,
                projectId: body.id || null,
                projectPath: body.path_with_namespace || null
              });
            "
          else
            echo "Non-JSON response received."
            grep -io '<title>[^<]*' "${RESPONSE_FILE}" \
              | head -n 1 \
              | sed 's/<title>//i' \
              || true
          fi

          if [ "${HTTP_STATUS}" != "200" ]; then
            echo "::error::GitLab is not accessible from this GitHub runner."
            exit 1
          fi
          
      - name: Clone tota11y-scan from GitLab
        env:
          GITLAB_USERNAME: ${{ secrets.TOTA11Y_GITLAB_USERNAME }}
          GITLAB_TOKEN: ${{ secrets.TOTA11Y_GITLAB_TOKEN }}
          SCANNER_REF: "main"
        run: |
          set -eu

          NETRC_FILE="${HOME}/.netrc"
          trap 'rm -f "${NETRC_FILE}"' EXIT

          printf '%s\n' \
            "machine gitlab.tech.orange" \
            "login ${GITLAB_USERNAME}" \
            "password ${GITLAB_TOKEN}" \
            > "${NETRC_FILE}"

          chmod 600 "${NETRC_FILE}"

          echo "Testing access to the GitLab repository..."

          git ls-remote \
            "https://gitlab.tech.orange/damien.gomez/tota11y-scan.git" \
            HEAD

          echo "Cloning tota11y-scan ref ${SCANNER_REF}..."

          git clone \
            --depth 1 \
            --branch "${SCANNER_REF}" \
            "https://gitlab.tech.orange/damien.gomez/tota11y-scan.git" \
            .tota11y-scan

      - name: Configure private npm registry
        working-directory: .tota11y-scan
        env:
          GITLAB_TOKEN: ${{ secrets.TOTA11Y_GITLAB_TOKEN }}
        run: |
          set -eu

          export NPM_CONFIG_USERCONFIG="${PWD}/.npmrc.github"

          npm \
            --userconfig "${NPM_CONFIG_USERCONFIG}" \
            config set \
            @tota11y-scan:registry \
            "https://gitlab.tech.orange/api/v4/projects/574357/packages/npm/"

          npm \
            --userconfig "${NPM_CONFIG_USERCONFIG}" \
            config set -- \
            "//gitlab.tech.orange/api/v4/projects/574357/packages/npm/:_authToken" \
            "${GITLAB_TOKEN}"

          echo "NPM_CONFIG_USERCONFIG=${NPM_CONFIG_USERCONFIG}" >> "${GITHUB_ENV}"

      - name: Install tota11y-scan
        working-directory: .tota11y-scan
        run: |
          set -eu

          npm ci
          node scripts/patch-engine-auth.js

      - name: Run accessibility scan
        working-directory: .tota11y-scan
        run: |
          set -eu
          npm run ci:a11y

      - name: Upload accessibility reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-reports
          path: |
            .tota11y-scan/a11y-report.json
            .tota11y-scan/reports
          if-no-files-found: ignore
          retention-days: 30
